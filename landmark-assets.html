<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow" />
    <title>ランドマーク素材一覧｜海老名びより</title>
    <style>
      :root { color-scheme: light; --ink: #183252; --soft: #66746f; --line: #d6ddd8; --paper: #fffef9; --base: #f2eee3; --teal: #155e63; --orange: #cf6045; }
      * { box-sizing: border-box; }
      body { margin: 0; background: var(--base); color: var(--ink); font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif; }
      a { color: inherit; }
      .shell { width: min(1120px, calc(100% - 32px)); margin: 0 auto; }
      header { padding: 44px 0 30px; border-bottom: 1px solid var(--line); background: var(--paper); }
      header a { display: inline-block; margin-bottom: 22px; color: var(--teal); font-size: .86rem; font-weight: 800; text-underline-offset: 3px; }
      h1 { margin: 0 0 10px; font-family: "Yu Mincho", "Hiragino Mincho ProN", serif; font-size: clamp(2rem, 6vw, 4.5rem); font-weight: 500; letter-spacing: .06em; }
      header p { max-width: 760px; margin: 0; color: var(--soft); line-height: 1.8; }
      main { padding: 34px 0 60px; }
      .guide { display: grid; gap: 8px; margin-bottom: 28px; padding: 20px 22px; border-left: 5px solid var(--orange); background: var(--paper); box-shadow: 0 10px 28px rgba(24,50,82,.06); }
      .guide strong { font-size: 1rem; }
      .guide p { margin: 0; color: var(--soft); font-size: .84rem; line-height: 1.75; }
      .guide code { padding: 2px 5px; border-radius: 3px; background: #e7eeeb; color: var(--teal); }
      .asset-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; }
      .asset-card { overflow: hidden; border: 1px solid var(--line); border-radius: 8px; background: var(--paper); box-shadow: 0 12px 30px rgba(24,50,82,.07); }
      .asset-preview { display: grid; min-height: 220px; place-items: center; padding: 30px; background: radial-gradient(circle, #fffef9 0%, #f3efe4 72%, #e8efeb 100%); }
      .asset-preview img { display: block; width: min(180px, 100%); aspect-ratio: 80 / 64; object-fit: contain; filter: drop-shadow(0 5px 5px rgba(24,50,82,.16)); }
      .asset-preview.is-missing::after { content: "画像ファイルが見つかりません"; color: #9b3929; font-size: .78rem; font-weight: 800; }
      .asset-preview.is-missing img { display: none; }
      .asset-meta { display: grid; gap: 6px; padding: 17px 18px 19px; border-top: 1px solid var(--line); }
      .asset-meta h2 { margin: 0; font-size: 1rem; }
      .asset-meta span { color: var(--teal); font-size: .69rem; font-weight: 800; }
      .asset-meta code { overflow-wrap: anywhere; color: var(--soft); font-size: .68rem; }
      .empty { padding: 30px; border: 1px solid var(--line); background: var(--paper); color: var(--soft); }
      @media (max-width: 560px) { header { padding-top: 30px; } .asset-grid { grid-template-columns: 1fr; } .asset-preview { min-height: 190px; } }
    </style>
  </head>
  <body>
    <header>
      <div class="shell">
        <a href="./index.html#/map">← 公開地図へ戻る</a>
        <h1>ランドマーク素材一覧</h1>
        <p>公開地図で使っているイラストを、元の画像ファイル単位で確認するための編集用ページです。</p>
      </div>
    </header>
    <main class="shell">
      <section class="guide" aria-label="差し替え方法">
        <strong>ご自身のイラストへ差し替える方法</strong>
        <p><code>assets/landmarks</code> に同じファイル名で上書きします。形式をSVGからPNG・WebPへ変えるときは、<code>city-landmarks-data.js</code> とSupabaseの <code>image_path</code> も新しいファイル名へ変更します。</p>
      </section>
      <div class="asset-grid" data-landmark-assets></div>
    </main>
    <script src="./city-landmarks-data.js?v=landmark-assets-18"></script>
    <script>
      (() => {
        const root = document.querySelector("[data-landmark-assets]");
        const pattern = /^[a-z0-9]+(?:-[a-z0-9]+)*\.(?:svg|png|webp)$/;
        const items = window.EBINA_CITY_LANDMARKS?.items || [];
        if (!items.length) {
          root.innerHTML = '<p class="empty">登録されているランドマーク素材はありません。</p>';
          return;
        }
        items.forEach((item) => {
          const file = String(item.imagePath || "").split(/[\\/]/).at(-1);
          if (!pattern.test(file)) return;
          const card = document.createElement("article");
          card.className = "asset-card";
          const link = document.createElement("a");
          link.className = "asset-preview";
          link.href = `./assets/landmarks/${file}`;
          link.target = "_blank";
          link.rel = "noopener";
          link.title = `${item.name}の画像ファイルを開く`;
          const image = document.createElement("img");
          image.src = link.href;
          image.alt = item.name;
          image.addEventListener("error", () => link.classList.add("is-missing"));
          link.appendChild(image);
          const meta = document.createElement("div");
          meta.className = "asset-meta";
          const category = document.createElement("span");
          category.textContent = item.category || "ランドマーク";
          const name = document.createElement("h2");
          name.textContent = item.name;
          const path = document.createElement("code");
          path.textContent = `assets/landmarks/${file}`;
          meta.append(category, name, path);
          card.append(link, meta);
          root.appendChild(card);
        });
      })();
    </script>
  </body>
</html>
